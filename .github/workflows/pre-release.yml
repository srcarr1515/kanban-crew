name: Create GitHub Pre-Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  pull-requests: write

env:
  NODE_VERSION: 22
  PNPM_VERSION: 10.13.1
  RUST_TOOLCHAIN: nightly-2025-12-04
  CARGO_XWIN_VERSION: 0.20.2

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.version.outputs.new_tag }}
      new_version: ${{ steps.version.outputs.new_version }}
      branch_suffix: ${{ steps.branch.outputs.suffix }}
    steps:
      - name: Cache cargo-edit
        uses: actions/cache@v4
        id: cache-cargo-edit
        with:
          path: ~/.cargo/bin/cargo-set-version
          key: cargo-edit-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}

      - name: Install cargo-edit
        if: steps.cache-cargo-edit.outputs.cache-hit != 'true'
        run: cargo install cargo-edit

      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Generate branch suffix
        id: branch
        run: |
          branch_name="${{ github.ref_name }}"
          suffix=$(echo "$branch_name" | tail -c 7 | sed 's/[^a-zA-Z0-9]//g' | tr '[:upper:]' '[:lower:]')
          echo "Branch: $branch_name"
          echo "Suffix: $suffix"
          echo "suffix=$suffix" >> $GITHUB_OUTPUT

      - name: Determine and update versions
        id: version
        run: |
          latest_npm_version=$(npm view kanban-crew version 2>/dev/null || echo "0.0.0")
          echo "Latest npm version: $latest_npm_version"

          current_repo_version=$(node -p "require('./package.json').version")
          echo "Current repo version: $current_repo_version"

          base_version=$(node -e "
            const npm = '$latest_npm_version'.split('.').map(Number);
            const repo = '$current_repo_version'.split('.').map(Number);
            for (let i = 0; i < 3; i++) {
              if ((npm[i] || 0) > (repo[i] || 0)) { console.log('$latest_npm_version'); process.exit(); }
              if ((repo[i] || 0) > (npm[i] || 0)) { console.log('$current_repo_version'); process.exit(); }
            }
            console.log('$current_repo_version');
          ")
          echo "Base version for bump: $base_version"

          timestamp=$(date +%Y%m%d%H%M%S)

          if [[ "${{ github.event.inputs.version_type }}" == "prerelease" ]]; then
            npm version prerelease --preid="${{ steps.branch.outputs.suffix }}" --no-git-tag-version
            new_version=$(node -p "require('./package.json').version")
            new_tag="v${new_version}.${timestamp}"
          else
            npm version $base_version --no-git-tag-version --allow-same-version
            npm version ${{ github.event.inputs.version_type }} --no-git-tag-version
            new_version=$(node -p "require('./package.json').version")
            new_tag="v${new_version}-${timestamp}"
          fi

          (cd npx-cli && npm version $new_version --no-git-tag-version --allow-same-version)
          (cd packages/local-web && npm version $new_version --no-git-tag-version --allow-same-version)

          cargo set-version --workspace "$new_version"

          node -e "
            const fs = require('fs');
            const path = 'crates/tauri-app/tauri.conf.json';
            const conf = JSON.parse(fs.readFileSync(path, 'utf8'));
            conf.version = '$new_version';
            fs.writeFileSync(path, JSON.stringify(conf, null, 2) + '\n');
          "

          echo "New version: $new_version"
          echo "new_version=$new_version" >> $GITHUB_OUTPUT
          echo "new_tag=$new_tag" >> $GITHUB_OUTPUT

      - name: Commit changes and create tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package.json pnpm-lock.yaml npx-cli/package.json packages/local-web/package.json crates/tauri-app/tauri.conf.json Cargo.lock
          git add $(find . -name Cargo.toml)
          [ -f crates/relay-tunnel/Cargo.lock ] && git add crates/relay-tunnel/Cargo.lock || true
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }}"
          git tag -a ${{ steps.version.outputs.new_tag }} -m "Release ${{ steps.version.outputs.new_tag }}"
          git push
          git push --tags

  build-frontend:
    needs: bump-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.new_tag }}

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Install dependencies
        run: pnpm install

      - name: Lint frontend
        run: cd packages/local-web && npm run lint

      - name: Type check frontend
        run: cd packages/local-web && npx tsc --noEmit

      - name: Build frontend
        run: cd packages/local-web && npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: packages/local-web/dist/
          retention-days: 1

  build-backend:
    needs: [bump-version, build-frontend]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: linux-x64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: linux-arm64
          - target: x86_64-pc-windows-msvc
            os: ubuntu-latest
            name: windows-x64
          - target: x86_64-apple-darwin
            os: macos-15
            name: macos-x64
          - target: aarch64-apple-darwin
            os: macos-15
            name: macos-arm64
          - target: aarch64-pc-windows-msvc
            os: ubuntu-latest
            name: windows-arm64
    env:
      CARGO_INCREMENTAL: "0"
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      SCCACHE_CACHE_SIZE: "10G"
      CARGO_HOME: ${{ github.workspace }}/.cargo
      RUSTUP_HOME: ${{ github.workspace }}/.rustup
      XWIN_CACHE_DIR: ${{ github.workspace }}/.xwin-cache
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.new_tag }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@main

      - name: Cache Rust toolchain
        uses: actions/cache@v4
        with:
          path: .rustup/toolchains
          key: rust-toolchain-${{ runner.os }}-${{ matrix.target }}-${{ env.RUST_TOOLCHAIN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y clang libclang-dev lld llvm nasm cmake ninja-build

          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            DEBIAN_FRONTEND=noninteractive sudo apt-get install -y clang-19 clang-tools-19 llvm-19 lld-19
            echo "/usr/lib/llvm-19/bin" >> $GITHUB_PATH
          fi

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            .cargo/registry/cache
            .cargo/registry/index
            .cargo/git/db
            .cargo/bin
            .cargo/.crates.toml
            .cargo/.crates2.json
          key: cargo-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-${{ matrix.target }}-

      - name: Install Zig
        if: runner.os == 'Linux' && !contains(matrix.target, 'windows')
        uses: mlugg/setup-zig@v1
        with:
          version: 0.15.2

      - name: Install cargo zigbuild
        if: runner.os == 'Linux' && !contains(matrix.target, 'windows')
        run: cargo install --locked cargo-zigbuild --version 0.20.1

      - name: Install cargo xwin
        if: runner.os == 'Linux' && contains(matrix.target, 'windows')
        run: cargo install --locked cargo-xwin --version ${{ env.CARGO_XWIN_VERSION }}

      - name: Cache xwin downloads
        if: runner.os == 'Linux' && contains(matrix.target, 'windows')
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.xwin-cache
          key: xwin-${{ runner.os }}-${{ matrix.target }}-cargo-xwin-${{ env.CARGO_XWIN_VERSION }}

      - name: Cache target
        uses: actions/cache@v4
        with:
          path: target
          key: target-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-${{ matrix.target }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            target-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-${{ matrix.target }}-${{ github.ref_name }}-
            target-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-${{ matrix.target }}-

      - name: Install cargo-sweep
        run: cargo install --locked cargo-sweep --version 0.8.0

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: packages/local-web/dist/

      - name: Build backend (Linux)
        if: runner.os == 'Linux' && !contains(matrix.target, 'windows')
        run: |
          cargo zigbuild --release --target ${{ matrix.target }} -p server -p mcp -p review --bin server --bin kanban-crew-mcp --bin review

      - name: Build backend (macOS)
        if: runner.os == 'macOS'
        run: |
          if [[ "${{ matrix.target }}" == "x86_64-apple-darwin" ]]; then
            export MACOSX_DEPLOYMENT_TARGET=10.12
          elif [[ "${{ matrix.target }}" == "aarch64-apple-darwin" ]]; then
            export MACOSX_DEPLOYMENT_TARGET=11.0
          fi
          cargo build --release --target ${{ matrix.target }} -p server -p mcp -p review --bin server --bin kanban-crew-mcp --bin review

      - name: Build backend (Windows cross-compile)
        if: runner.os == 'Linux' && contains(matrix.target, 'windows')
        run: |
          if [[ "${{ matrix.target }}" == "aarch64-pc-windows-msvc" ]]; then
            chmod +x scripts/ring-cc-wrapper.sh scripts/clang
            export PATH="${{ github.workspace }}/scripts:$PATH"
            export RING_CC=/usr/lib/llvm-19/bin/clang
            export DEFAULT_CC=clang-cl
            export CC_aarch64_pc_windows_msvc="${{ github.workspace }}/scripts/ring-cc-wrapper.sh"
          fi
          cargo xwin build --cross-compiler clang-cl --release --target ${{ matrix.target }} -p server -p mcp -p review --bin server --bin kanban-crew-mcp --bin review
        env:
          CARGO_PROFILE_RELEASE_DEBUG: 0

      - name: Prepare binaries (non-macOS)
        if: runner.os != 'macOS'
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.name }}" == *"windows"* ]]; then
            cp target/${{ matrix.target }}/release/server.exe dist/kanban-crew-${{ matrix.name }}.exe
            cp target/${{ matrix.target }}/release/kanban-crew-mcp.exe dist/kanban-crew-mcp-${{ matrix.name }}.exe
            cp target/${{ matrix.target }}/release/review.exe dist/kanban-crew-review-${{ matrix.name }}.exe
          else
            cp target/${{ matrix.target }}/release/server dist/kanban-crew-${{ matrix.name }}
            cp target/${{ matrix.target }}/release/kanban-crew-mcp dist/kanban-crew-mcp-${{ matrix.name }}
            cp target/${{ matrix.target }}/release/review dist/kanban-crew-review-${{ matrix.name }}
          fi

      - name: Prepare binaries (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/server dist/kanban-crew-${{ matrix.name }}
          cp target/${{ matrix.target }}/release/kanban-crew-mcp dist/kanban-crew-mcp-${{ matrix.name }}
          cp target/${{ matrix.target }}/release/review dist/kanban-crew-review-${{ matrix.name }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-binary-${{ matrix.name }}
          path: dist/
          retention-days: 1

      - name: Sweep Cargo target cache
        shell: bash
        run: |
          cargo sweep --maxsize 10GB
          cargo sweep --time 30

  package-npx-cli:
    needs: [bump-version, build-frontend, build-backend]
    runs-on: ubuntu-latest
    strategy:
      # NOTE: Keep in sync with build-backend matrix
      matrix:
        include:
          - name: linux-x64
            binary: kanban-crew
            mcp_binary: kanban-crew-mcp
            review_binary: kanban-crew-review
          - name: windows-x64
            binary: kanban-crew.exe
            mcp_binary: kanban-crew-mcp.exe
            review_binary: kanban-crew-review.exe
          - name: macos-x64
            binary: kanban-crew
            mcp_binary: kanban-crew-mcp
            review_binary: kanban-crew-review
          - name: macos-arm64
            binary: kanban-crew
            mcp_binary: kanban-crew-mcp
            review_binary: kanban-crew-review
          - name: windows-arm64
            binary: kanban-crew.exe
            mcp_binary: kanban-crew-mcp.exe
            review_binary: kanban-crew-review.exe
          - name: linux-arm64
            binary: kanban-crew
            mcp_binary: kanban-crew-mcp
            review_binary: kanban-crew-review
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.new_tag }}

      - name: Download backend binary artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-binary-${{ matrix.name }}
          path: dist/

      - name: Create platform zip packages
        run: |
          mkdir -p npx-cli/dist/${{ matrix.name }}

          # Zip each binary into its own file, named {binary}-{platform}.zip for GitHub Releases flat layout
          if [[ "${{ matrix.name }}" == *"windows"* ]]; then
            cp dist/kanban-crew-${{ matrix.name }}.exe kanban-crew.exe
            cp dist/kanban-crew-mcp-${{ matrix.name }}.exe kanban-crew-mcp.exe
            cp dist/kanban-crew-review-${{ matrix.name }}.exe kanban-crew-review.exe
            zip npx-cli/dist/${{ matrix.name }}/kanban-crew-${{ matrix.name }}.zip kanban-crew.exe
            zip npx-cli/dist/${{ matrix.name }}/kanban-crew-mcp-${{ matrix.name }}.zip kanban-crew-mcp.exe
            zip npx-cli/dist/${{ matrix.name }}/kanban-crew-review-${{ matrix.name }}.zip kanban-crew-review.exe
          else
            cp dist/kanban-crew-${{ matrix.name }} kanban-crew
            cp dist/kanban-crew-mcp-${{ matrix.name }} kanban-crew-mcp
            cp dist/kanban-crew-review-${{ matrix.name }} kanban-crew-review
            zip npx-cli/dist/${{ matrix.name }}/kanban-crew-${{ matrix.name }}.zip kanban-crew
            zip npx-cli/dist/${{ matrix.name }}/kanban-crew-mcp-${{ matrix.name }}.zip kanban-crew-mcp
            zip npx-cli/dist/${{ matrix.name }}/kanban-crew-review-${{ matrix.name }}.zip kanban-crew-review
          fi

          # Also create the plain-named zips that the npx CLI's local dev mode expects
          cp npx-cli/dist/${{ matrix.name }}/kanban-crew-${{ matrix.name }}.zip npx-cli/dist/${{ matrix.name }}/kanban-crew.zip
          cp npx-cli/dist/${{ matrix.name }}/kanban-crew-mcp-${{ matrix.name }}.zip npx-cli/dist/${{ matrix.name }}/kanban-crew-mcp.zip
          cp npx-cli/dist/${{ matrix.name }}/kanban-crew-review-${{ matrix.name }}.zip npx-cli/dist/${{ matrix.name }}/kanban-crew-review.zip

      - name: Upload platform package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npx-platform-${{ matrix.name }}
          path: npx-cli/dist/
          retention-days: 1

  build-tauri:
    needs: [bump-version, build-frontend]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-15
            platform: darwin-aarch64
          - target: x86_64-apple-darwin
            os: macos-15
            platform: darwin-x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-aarch64
          - target: x86_64-pc-windows-msvc
            os: ubuntu-latest
            platform: windows-x86_64
          - target: aarch64-pc-windows-msvc
            os: ubuntu-latest
            platform: windows-aarch64
    env:
      CARGO_INCREMENTAL: "0"
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      SCCACHE_CACHE_SIZE: "10G"
      CARGO_HOME: ${{ github.workspace }}/.cargo
      RUSTUP_HOME: ${{ github.workspace }}/.rustup
      XWIN_CACHE_DIR: ${{ github.workspace }}/.xwin-cache
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.new_tag }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@main

      - name: Cache Rust toolchain
        uses: actions/cache@v4
        with:
          path: .rustup/toolchains
          key: rust-toolchain-${{ runner.os }}-${{ matrix.target }}-${{ env.RUST_TOOLCHAIN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            .cargo/registry/cache
            .cargo/registry/index
            .cargo/git/db
            .cargo/bin
            .cargo/.crates.toml
            .cargo/.crates2.json
          key: cargo-tauri-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-tauri-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-${{ matrix.target }}-

      - name: Cache target
        uses: actions/cache@v4
        with:
          path: target
          key: tauri-target-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-${{ matrix.target }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            tauri-target-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-${{ matrix.target }}-${{ github.ref_name }}-
            tauri-target-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-${{ matrix.target }}-

      - name: Install cargo-sweep
        run: cargo install --locked cargo-sweep --version 0.8.0

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Install Linux dependencies
        if: runner.os == 'Linux' && contains(matrix.target, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev \
            libxdo-dev file pkg-config xdg-utils

      - name: Install Windows cross-compilation dependencies
        if: runner.os == 'Linux' && contains(matrix.target, 'windows')
        run: |
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y \
            clang libclang-dev lld llvm nasm cmake ninja-build nsis \
            clang-19 clang-tools-19 llvm-19 lld-19 \
            meson valac bison gobject-introspection libgirepository1.0-dev \
            libglib2.0-dev libgsf-1-dev libgcab-dev libmsi-dev
          echo "/usr/lib/llvm-19/bin" >> $GITHUB_PATH

      - name: Build and install wixl
        if: runner.os == 'Linux' && contains(matrix.target, 'windows')
        env:
          RUSTC_WRAPPER: ""
        run: |
          cd /tmp
          curl -sL https://download.gnome.org/sources/msitools/0.103/msitools-0.103.tar.xz | tar xJ
          cd msitools-0.103
          meson setup builddir --prefix=/usr
          meson compile -C builddir wixl
          sudo install -m755 builddir/tools/wixl/wixl /usr/local/bin/wixl
          sudo install -m644 builddir/libmsi/libmsi-1.0.so.0.0.0 /usr/local/lib/
          sudo ln -sf libmsi-1.0.so.0.0.0 /usr/local/lib/libmsi-1.0.so.0
          sudo ln -sf libmsi-1.0.so.0 /usr/local/lib/libmsi-1.0.so
          sudo ldconfig
          sudo mkdir -p /usr/share/wixl-0.103/ext
          sudo cp -r data/ext/ui /usr/share/wixl-0.103/ext/
          cd / && rm -rf /tmp/msitools-0.103
          wixl --version

      - name: Install cargo-xwin
        if: runner.os == 'Linux' && contains(matrix.target, 'windows')
        run: cargo install --locked cargo-xwin --version ${{ env.CARGO_XWIN_VERSION }}

      - name: Cache xwin downloads
        if: runner.os == 'Linux' && contains(matrix.target, 'windows')
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.xwin-cache
          key: xwin-${{ runner.os }}-${{ matrix.target }}-cargo-xwin-${{ env.CARGO_XWIN_VERSION }}

      - name: Install dependencies
        run: pnpm install

      - name: Install Tauri CLI
        uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: tauri-cli@2

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: packages/local-web/dist/

      - name: Patch tauri.conf.json updater endpoint
        run: |
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('crates/tauri-app/tauri.conf.json', 'utf8'));
            const endpoint = 'https://github.com/srcarr1515/kanban-crew/releases/latest/download/tauri-update.json';
            conf.plugins.updater.endpoints = conf.plugins.updater.endpoints.map(e =>
              e === '__TAURI_UPDATE_ENDPOINT__' ? endpoint : e
            );
            fs.writeFileSync('crates/tauri-app/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "

      - name: Set up Apple notarization key
        if: runner.os == 'macOS'
        env:
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.private_keys
          KEY_PATH="$HOME/.private_keys/AuthKey_${API_KEY_ID}.p8"
          printf '%s' "$API_PRIVATE_KEY" > "$KEY_PATH"
          echo "APPLE_API_KEY=$API_KEY_ID" >> $GITHUB_ENV
          echo "APPLE_API_ISSUER=$API_ISSUER" >> $GITHUB_ENV
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> $GITHUB_ENV

      - name: Build Tauri app
        run: |
          if [[ "${{ matrix.target }}" == "aarch64-pc-windows-msvc" ]]; then
            chmod +x scripts/ring-cc-wrapper.sh scripts/clang
            export PATH="${{ github.workspace }}/scripts:$PATH"
            export RING_CC=/usr/lib/llvm-19/bin/clang
            export DEFAULT_CC=clang-cl
            export CC_aarch64_pc_windows_msvc="${{ github.workspace }}/scripts/ring-cc-wrapper.sh"
            export CARGO_PROFILE_RELEASE_DEBUG=0
          fi

          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            cargo tauri build --runner cargo-xwin --target ${{ matrix.target }} --ci
          else
            cargo tauri build --target ${{ matrix.target }} --ci
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ env.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}

      - name: Build MSI with wixl
        if: contains(matrix.target, 'windows')
        run: |
          node scripts/build-tauri-msi.js \
            --target ${{ matrix.target }} \
            --version ${{ needs.bump-version.outputs.new_version }}

      - name: Setup Jsign
        if: contains(matrix.target, 'windows')
        id: jsign
        uses: ./.github/actions/setup-jsign

      - name: Install JRE for Jsign
        if: contains(matrix.target, 'windows')
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre-headless

      - name: Azure CLI login
        if: contains(matrix.target, 'windows') && env.AZURE_ENDPOINT != ''
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'
          allow-no-subscriptions: true
        env:
          AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}

      - name: Sign Windows artifacts
        if: contains(matrix.target, 'windows') && env.AZURE_ENDPOINT != ''
        env:
          AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
          AZURE_CODE_SIGNING_NAME: ${{ secrets.AZURE_CODE_SIGNING_NAME }}
          AZURE_CERT_PROFILE_NAME: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
        run: |
          TOKEN=$(az account get-access-token --resource https://codesigning.azure.net --query accessToken -o tsv)
          KEYSTORE=$(echo "$AZURE_ENDPOINT" | sed 's|https\?://||;s|/.*||')
          find target/${{ matrix.target }}/release/bundle -type f \( -name "*.exe" -o -name "*.msi" \) | while read file; do
            echo "Signing: $file"
            java -jar "${{ steps.jsign.outputs.jar-path }}" \
              --storetype TRUSTEDSIGNING \
              --keystore "$KEYSTORE" \
              --storepass "$TOKEN" \
              --alias "${AZURE_CODE_SIGNING_NAME}/${AZURE_CERT_PROFILE_NAME}" \
              --tsaurl http://timestamp.acs.microsoft.com \
              --tsmode RFC3161 \
              "$file"
          done

      - name: Collect Tauri artifacts
        run: |
          mkdir -p tauri-artifacts/${{ matrix.platform }}
          find target/${{ matrix.target }}/release/bundle -name "*.sig" | while read sig; do
            artifact="${sig%.sig}"
            if [ -f "$artifact" ]; then
              cp "$artifact" "tauri-artifacts/${{ matrix.platform }}/"
              cp "$sig" "tauri-artifacts/${{ matrix.platform }}/"
            fi
          done
          find target/${{ matrix.target }}/release/bundle \
            \( -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.msi" -o -name "*-setup.exe" \) | while read f; do
            cp "$f" "tauri-artifacts/${{ matrix.platform }}/"
          done
          echo "Artifacts for ${{ matrix.platform }}:"
          ls -la tauri-artifacts/${{ matrix.platform }}/

      - name: Clean up signing keys
        if: always() && runner.os == 'macOS'
        run: rm -rf ~/.private_keys

      - name: Upload Tauri artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-artifacts-${{ matrix.platform }}
          path: tauri-artifacts/
          retention-days: 1

      - name: Sweep Cargo target cache
        if: always()
        run: |
          cargo sweep --maxsize 10GB
          cargo sweep --time 30

  create-prerelease:
    needs: [bump-version, build-frontend, package-npx-cli, build-tauri]
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create-release.outputs.url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.new_tag }}

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: packages/local-web/dist/

      - name: Zip frontend
        run: |
          mkdir kanban-crew-${{ needs.bump-version.outputs.new_tag }}
          mv packages/local-web/dist kanban-crew-${{ needs.bump-version.outputs.new_tag }}
          zip -r kanban-crew-${{ needs.bump-version.outputs.new_tag }}.zip kanban-crew-${{ needs.bump-version.outputs.new_tag }}

      - name: Setup Node for npm pack
        uses: ./.github/actions/setup-node

      - name: Install npx-cli dependencies
        run: |
          cd npx-cli
          npm install

      - name: Build npx-cli and pack
        run: |
          cd npx-cli
          npm run build
          # Inject the release tag (base URL is hardcoded in download.ts to GitHub Releases)
          sed -i "s|__BINARY_TAG__|${{ needs.bump-version.outputs.new_tag }}|g" bin/cli.js
          npm pack

      - name: Create GitHub Pre-Release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-version.outputs.new_tag }}
          name: Pre-release ${{ needs.bump-version.outputs.new_tag }}
          prerelease: true
          generate_release_notes: true
          files: |
            kanban-crew-${{ needs.bump-version.outputs.new_tag }}.zip
            npx-cli/kanban-crew-*.tgz

  upload-binaries:
    needs: [bump-version, package-npx-cli, create-prerelease]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.new_tag }}

      - name: Download all platform packages
        uses: actions/download-artifact@v4
        with:
          pattern: npx-platform-*
          path: binaries/
          merge-multiple: true

      - name: Generate manifest.json
        run: |
          TAG="${{ needs.bump-version.outputs.new_tag }}"
          node -e "
            const fs = require('fs');
            const crypto = require('crypto');
            const manifest = { version: '$TAG', platforms: {} };
            const platforms = ['linux-x64', 'linux-arm64', 'windows-x64', 'windows-arm64', 'macos-x64', 'macos-arm64'];
            const binaries = ['kanban-crew', 'kanban-crew-mcp', 'kanban-crew-review'];

            for (const platform of platforms) {
              manifest.platforms[platform] = {};
              for (const binary of binaries) {
                // Named-zip (binary-platform.zip) is the release asset name
                const zipPath = \`binaries/\${platform}/\${binary}-\${platform}.zip\`;
                if (fs.existsSync(zipPath)) {
                  const data = fs.readFileSync(zipPath);
                  manifest.platforms[platform][binary] = {
                    sha256: crypto.createHash('sha256').update(data).digest('hex'),
                    size: data.length
                  };
                }
              }
            }
            fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, 2));
            console.log('Generated manifest.json');
            console.log(JSON.stringify(manifest, null, 2));
          "

      - name: Upload binaries and manifest to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.bump-version.outputs.new_tag }}
        run: |
          # Upload manifest.json
          gh release upload "$TAG" manifest.json --clobber

          # Upload each platform binary zip
          for platform in linux-x64 linux-arm64 windows-x64 windows-arm64 macos-x64 macos-arm64; do
            for binary in kanban-crew kanban-crew-mcp kanban-crew-review; do
              zipfile="binaries/$platform/$binary-$platform.zip"
              if [ -f "$zipfile" ]; then
                echo "Uploading $zipfile..."
                gh release upload "$TAG" "$zipfile" --clobber
              fi
            done
          done

  upload-tauri-assets:
    needs: [bump-version, build-tauri, create-prerelease]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.new_tag }}

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Download all Tauri artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: tauri-artifacts-*
          path: tauri-artifacts/
          merge-multiple: true

      - name: List Tauri artifacts
        run: find tauri-artifacts/

      - name: Generate tauri-update.json
        run: |
          node scripts/generate-tauri-update-json.js \
            --version "${{ needs.bump-version.outputs.new_version }}" \
            --notes "Release ${{ needs.bump-version.outputs.new_tag }}" \
            --artifacts-dir ./tauri-artifacts \
            --download-base "https://github.com/srcarr1515/kanban-crew/releases/download/${{ needs.bump-version.outputs.new_tag }}" \
            --output tauri-update.json
          echo "Generated tauri-update.json:"
          cat tauri-update.json

      - name: Generate desktop-manifest.json
        run: |
          node scripts/generate-desktop-manifest.js \
            --version "${{ needs.bump-version.outputs.new_version }}" \
            --artifacts-dir ./tauri-artifacts \
            --output desktop-manifest.json
          echo "Generated desktop-manifest.json:"
          cat desktop-manifest.json

      - name: Upload Tauri assets to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.bump-version.outputs.new_tag }}
        run: |
          # Upload manifests
          gh release upload "$TAG" tauri-update.json --clobber
          gh release upload "$TAG" desktop-manifest.json --clobber

          # Upload Tauri installers (flat — no platform subdirectory)
          find tauri-artifacts -type f \( -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.msi" -o -name "*-setup.exe" \) | while read f; do
            echo "Uploading $(basename $f)..."
            gh release upload "$TAG" "$f" --clobber
          done
